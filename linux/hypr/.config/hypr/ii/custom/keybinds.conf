# Add stuff here
# Use #! to add an extra column on the cheatsheet
# Use ##! to add a section in that column
# Add a comment after a bind to add a description, like above

#/# bind = Super+Shift, Hash,, # Send to workspace # (1, 2, 3,...)
# We use raw keycodes because some keyboard layouts register number keys as different chars. The codes can be verified with `wev`
bind = Super+Shift, code:10, exec, $scriptsPath/workspace_action.sh movetoworkspace 1 # [hidden]
bind = Super+Shift, code:11, exec, $scriptsPath/workspace_action.sh movetoworkspace 2 # [hidden]
bind = Super+Shift, code:12, exec, $scriptsPath/workspace_action.sh movetoworkspace 3 # [hidden]
bind = Super+Shift, code:15, exec, $scriptsPath/workspace_action.sh movetoworkspace 6 # [hidden]
bind = Super+Shift, code:16, exec, $scriptsPath/workspace_action.sh movetoworkspace 7 # [hidden]
bind = Super+Shift, code:13, exec, $scriptsPath/workspace_action.sh movetoworkspace 4 # [hidden]
bind = Super+Shift, code:14, exec, $scriptsPath/workspace_action.sh movetoworkspace 5 # [hidden]
bind = Super+Shift, code:17, exec, $scriptsPath/workspace_action.sh movetoworkspace 8 # [hidden]
bind = Super+Shift, code:18, exec, $scriptsPath/workspace_action.sh movetoworkspace 9 # [hidden]
bind = Super+Shift, code:19, exec, $scriptsPath/workspace_action.sh movetoworkspace 10 # [hidden]
# keypad numbers
bind = Super+Shift, code:87, exec, $scriptsPath/workspace_action.sh movetoworkspace 1  # [hidden]
bind = Super+Shift, code:88, exec, $scriptsPath/workspace_action.sh movetoworkspace 2  # [hidden]
bind = Super+Shift, code:89, exec, $scriptsPath/workspace_action.sh movetoworkspace 3  # [hidden]
bind = Super+Shift, code:83, exec, $scriptsPath/workspace_action.sh movetoworkspace 4  # [hidden]
bind = Super+Shift, code:84, exec, $scriptsPath/workspace_action.sh movetoworkspace 5  # [hidden]
bind = Super+Shift, code:85, exec, $scriptsPath/workspace_action.sh movetoworkspace 6  # [hidden]
bind = Super+Shift, code:79, exec, $scriptsPath/workspace_action.sh movetoworkspace 7  # [hidden]
bind = Super+Shift, code:80, exec, $scriptsPath/workspace_action.sh movetoworkspace 8  # [hidden]
bind = Super+Shift, code:81, exec, $scriptsPath/workspace_action.sh movetoworkspace 9  # [hidden]
bind = Super+Shift, code:90, exec, $scriptsPath/workspace_action.sh movetoworkspace 10 # [hidden]

# #/# bind = Super+Shift, Scroll ↑/↓,, # Send to workspace left/right
bind = Super+Shift, mouse_down, movetoworkspace, r-1 # [hidden]
bind = Super+Shift, mouse_up, movetoworkspace, r+1 # [hidden]
bind = Super+Alt, mouse_down, movetoworkspace, -1 # [hidden]
bind = Super+Alt, mouse_up, movetoworkspace, +1 # [hidden]

#/# bind = Super+Shift, Page_↑/↓,, # Send to workspace left/right
bind = Super+Alt, Page_Down, movetoworkspace, +1 # [hidden]
bind = Super+Alt, Page_Up, movetoworkspace, -1 # [hidden]
bind = Super+Shift, Page_Down, movetoworkspace, r+1  # [hidden]
bind = Super+Shift, Page_Up, movetoworkspace, r-1  # [hidden]
bind = Ctrl+Super+Shift, Right, movetoworkspace, r+1 # [hidden]
bind = Ctrl+Super+Shift, Left, movetoworkspace, r-1 # [hidden]
