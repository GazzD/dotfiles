source = ~/.config/hypr/hyprlock/colors.conf

general {
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = true
}

# ─── Background ──────────────────────────────────────────────
background {
    monitor =
    path = $background_image
    blur_passes = 3
    blur_size = 7
    brightness = 0.65
    vibrancy = 0.12
    vibrancy_darkness = 0.0
    contrast = 0.95
}

# ─── Avatar ──────────────────────────────────────────────────
image {
    monitor =
    path = ~/.face
    size = 110
    rounding = -1
    border_size = 3
    border_color = $entry_border_color
    position = 0, 290
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
}

# ─── Clock ───────────────────────────────────────────────────
label {
    monitor =
    text = $TIME
    color = $text_color
    font_size = 72
    font_family = $font_family_clock
    shadow_passes = 3
    shadow_size = 5
    position = 0, 140
    halign = center
    valign = center
}

# ─── Date ────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:5000] date +"󰃶  %A, %B %d"
    color = $text_color
    font_size = 17
    font_family = $font_family
    shadow_passes = 2
    shadow_size = 3
    position = 0, 75
    halign = center
    valign = center
}

# ─── Input field ─────────────────────────────────────────────
input-field {
    monitor =
    size = 280, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $entry_color
    fade_on_empty = true
    fade_timeout = 1500
    placeholder_text =   Enter password
    rounding = 12
    check_color = rgba(CCA020FF)
    fail_color = rgba(CC3333FF)
    fail_text = <i>$FAIL  ($ATTEMPTS attempts)</i>
    capslock_color = rgba(DD8811FF)
    shadow_passes = 2
    position = 0, -10
    halign = center
    valign = center
}

# ─── Caps Lock warning ───────────────────────────────────────
label {
    monitor =
    text = cmd[update:250] ~/.config/hypr/hyprlock/check-capslock.sh
    color = rgba(DD8811FF)
    font_size = 13
    font_family = $font_family
    shadow_passes = 2
    position = 0, -80
    halign = center
    valign = center
}

# ─── Username ────────────────────────────────────────────────
label {
    monitor =
    text =   $USER
    color = $text_color
    font_size = 16
    font_family = $font_family
    shadow_passes = 2
    shadow_size = 3
    position = 0, 60
    halign = center
    valign = bottom
}

# ─── Status (battery / charging) ─────────────────────────────
label {
    monitor =
    text = cmd[update:5000] ~/.config/hypr/hyprlock/status.sh
    color = $text_color
    font_size = 14
    font_family = $font_family
    shadow_passes = 2
    position = 30, -30
    halign = left
    valign = top
}

# ─── Keyboard layout ─────────────────────────────────────────
label {
    monitor =
    text = $LAYOUT
    color = $text_color
    font_size = 14
    font_family = $font_family
    shadow_passes = 2
    position = -30, 30
    halign = right
    valign = bottom
}
