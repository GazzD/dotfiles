# hyprlang noerror false
# You can put custom rules here
# Window/layer rules: https://wiki.hyprland.org/Configuring/Window-Rules/
# Workspace rules: https://wiki.hyprland.org/Configuring/Workspace-Rules/

# ######## Window rules ########

# Uncomment to apply global transparency to all windows:
# windowrule = opacity 0.89 override 0.89 override, match:class .*

# Disable blur for all xwayland apps
# windowrule = no_blur on, match:xwayland 1

# Special workspaces
windowrule = workspace special:sysmon, match:class btop
windowrule = workspace special:music, match:class feishin|Spotify|Supersonic|Cider|com.github.th_ch.youtube_music
windowrule = workspace special:music, match:initial_title Spotify( Free)?  # Spotify wayland, it has no class for some reason
windowrule = workspace special:communication, match:class discord|equibop|vesktop|chrome-hnpfjngllnobngcgfapefoaidbinmjnm-Default
windowrule = workspace special:todo, match:class obsidian


# Images & Video Players
windowrule = match:class ^(mpv)$, float on
#windowrule = match:class ^(mpv)$, float on
windowrule = match:class ^(mpv)$, float on
windowrule = match:class ^(mpv)$, float on

windowrule = match:class ^(imv)$, float on
windowrule = match:class ^(swayimg)$, float on
