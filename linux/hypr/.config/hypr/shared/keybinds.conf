# hyprlang noerror false
# See https://wiki.hyprland.org/Configuring/Binds/
#!
##! User
unbind = Ctrl+Super, Slash
bind = Ctrl+Super, Slash, exec, zeditor ~/.config/hypr # Edit hyprland config

##! Apps
bind = Ctrl, E, exec, emote
unbind = Super, Return
bind = Super, Return, exec, hypr-launch "${TERMINAL}" "ghostty" "kitty -1" "foot" "alacritty" "wezterm" "konsole" "kgx" "uxterm" "xterm" # Terminal
unbind = Super, E
bind = Super, E, exec, hypr-launch "thunar" "dolphin" "nemo" "nautilus" "${TERMINAL}" "kitty -1 fish -c yazi" # File manager
unbind = Super, W
bind = Super, W, exec, hypr-launch "google-chrome-stable" "zen-browser" "firefox" "brave" "chromium" "microsoft-edge-stable" "opera" "librewolf" # Browser
unbind = Super, C
bind = Super, C, exec, hypr-launch "code" "codium" "cursor" "zed" "zedit" "zeditor" "kate" "gnome-text-editor" "emacs" "command -v nvim && kitty -1 nvim" "command -v micro && kitty -1 micro" # Code editor
unbind = Ctrl+Super+Shift+Alt, W
bind = Ctrl+Super+Shift+Alt, W, exec, hypr-launch "wps" "onlyoffice-desktopeditors" "libreoffice" # Office software
unbind = Super, X
bind = Super, X, exec, hypr-launch "kate" "gnome-text-editor" "emacs" # Text editor
unbind = Ctrl+Super, V
bind = Ctrl+Super, V, exec, hypr-launch "pavucontrol-qt" "pavucontrol" # Volume mixer
unbind = Super, I
bind = Super, I, exec, XDG_CURRENT_DESKTOP=gnome hypr-launch "qs -p ~/.config/quickshell/$qsConfig/settings.qml" "systemsettings" "gnome-control-center" "better-control" # Settings app
unbind = Ctrl+Shift, Escape
bind = Ctrl+Shift, Escape, exec, hypr-launch "gnome-system-monitor" "plasma-systemmonitor --page-name Processes" "command -v btop && kitty -1 fish -c btop" # Task manager

unbind = Super, F
bind = Super, F, fullscreen, 1 # Maximize
unbind = Super+Shift, F
bind = Super+Shift, F, fullscreen, 1 # Maximize

##! Special workspace toggles
# bind = Ctrl+Shift, Escape, exec, caelestia toggle sysmon
unbind = Super, S
bind = Super, S, togglespecialworkspace, special
unbind = Super, D
bind = Super, D, togglespecialworkspace, communication
unbind = Super, M
bind = Super, M, togglespecialworkspace, music
unbind = Super, R
bind = Super, R, togglespecialworkspace, todo

unbind = Super, T
unbind = Super+Shift, T
bind = Super, T, togglefloating, # Float/Tile

# Switch workspaces with mainMod + [0-9]
bind = Super, 1, split-workspace, 1
bind = Super, 2, split-workspace, 2
bind = Super, 3, split-workspace, 3
bind = Super, 4, split-workspace, 4
bind = Super, 5, split-workspace, 5
bind = Super, 6, split-workspace, 6
bind = Super, 7, split-workspace, 7
bind = Super, 8, split-workspace, 8
bind = Super, 9, split-workspace, 9
bind = Super, 0, split-workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = Super+Shift, 1, split-movetoworkspace, 1
bind = Super+Shift, 2, split-movetoworkspace, 2
bind = Super+Shift, 3, split-movetoworkspace, 3
bind = Super+Shift, 4, split-movetoworkspace, 4
bind = Super+Shift, 5, split-movetoworkspace, 5
bind = Super+Shift, 6, split-movetoworkspace, 6
bind = Super+Shift, 7, split-movetoworkspace, 7
bind = Super+Shift, 8, split-movetoworkspace, 8
bind = Super+Shift, 9, split-movetoworkspace, 9
bind = Super+Shift, 0, split-movetoworkspace, 10

# #/# bind = Super+Shift, Scroll ↑/↓,, # Send to workspace left/right
bind = Super+Shift, mouse_down, movetoworkspace, r-1 # [hidden]
bind = Super+Shift, mouse_up, movetoworkspace, r+1 # [hidden]
bind = Super+Alt, mouse_down, movetoworkspace, -1 # [hidden]
bind = Super+Alt, mouse_up, movetoworkspace, +1 # [hidden]

#/# bind = Super+Shift, Page_↑/↓,, # Send to workspace left/right
bind = Super+Alt, Page_Down, movetoworkspace, +1 # [hidden]
bind = Super+Alt, Page_Up, movetoworkspace, -1 # [hidden]
bind = Super+Shift, Page_Down, movetoworkspace, r+1  # [hidden]
bind = Super+Shift, Page_Up, movetoworkspace, r-1  # [hidden]
bind = Ctrl+Super+Shift, Right, movetoworkspace, r+1 # [hidden]
bind = Ctrl+Super+Shift, Left, movetoworkspace, r-1 # [hidden]


# Overview
bind = Super, TAB, exec, qs ipc -c overview call overview toggle
