# hyprlang noerror false
# For all available variables, see ~/.config/hypr/hyprland/variables.conf

$scriptsPath = ~/.config/hypr/ii/hyprland/scripts

# Apps
# PULL REQUESTS ADDING MORE WILL NOT BE ACCEPTED, CONFIG FOR YOURSELF
$terminal = $scriptsPath/launch_first_available.sh "ghostty" "kitty -1" "foot" "alacritty" "wezterm" "konsole" "kgx" "uxterm" "xterm"
$fileManager = $scriptsPath/launch_first_available.sh "thunar" "dolphin" "nautilus" "nemo" "kitty -1 fish -c yazi"
$browser = $scriptsPath/launch_first_available.sh "google-chrome-stable" "zen-browser" "firefox" "brave" "chromium" "microsoft-edge-stable" "opera" "librewolf"
$codeEditor = $scriptsPath/launch_first_available.sh "zeditor" "antigravity" "code" "codium" "cursor" "zed" "zedit" "kate" "gnome-text-editor" "emacs" "command -v nvim && kitty -1 nvim" "command -v micro && kitty -1 micro"
$officeSoftware = $scriptsPath/launch_first_available.sh "wps" "onlyoffice-desktopeditors" "libreoffice"
$textEditor = $scriptsPath/launch_first_available.sh "kate" "gnome-text-editor" "emacs"
$volumeMixer = $scriptsPath/launch_first_available.sh "pavucontrol-qt" "pavucontrol"
$settingsApp = XDG_CURRENT_DESKTOP=gnome $scriptsPath/launch_first_available.sh "qs -p ~/.config/quickshell/$qsConfig/settings.qml" "systemsettings" "gnome-control-center" "better-control"
$taskManager = $scriptsPath/launch_first_available.sh "gnome-system-monitor" "plasma-systemmonitor --page-name Processes" "command -v btop && kitty -1 fish -c btop"

# The folder within ~/.config/quickshell containing the config
$qsConfig = ii

# Leave blank like this to load default config. Set to anything to not.
$dontLoadDefaultExecs =
$dontLoadDefaultGeneral =
$dontLoadDefaultRules =
$dontLoadDefaultKeybinds =
